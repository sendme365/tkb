name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update plugin manifests
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib

          version = os.environ["VERSION"]

          p = pathlib.Path('.claude-plugin/plugin.json')
          d = json.loads(p.read_text())
          d['version'] = version
          p.write_text(json.dumps(d, indent=2) + '\n')

          p = pathlib.Path('.claude-plugin/marketplace.json')
          d = json.loads(p.read_text())
          for plugin in d.get('plugins', []):
              plugin['version'] = version
          p.write_text(json.dumps(d, indent=2) + '\n')

          print(f"Bumped to {version}")
          EOF

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TKB v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/sendme365/tkb/${{ github.ref_name }}/install.sh)
            ```
