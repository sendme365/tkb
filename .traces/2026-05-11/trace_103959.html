":{"name":{"type":"string","description":"Name of the corpus to rebuild"}},"required":["name"],"additionalProperties":true}},{"name":"mcp__plugin_claude-mem_mcp-search__reprime_corpus","description":"Create a fresh knowledge agent session for a corpus, clearing prior Q&A context. Use when conversation has drifted or after rebuilding.","input_schema":{"type":"object","properties":{"name":{"type":"string","description":"Name of the corpus to reprime"}},"required":["name"],"additionalProperties":true}},{"name":"mcp__plugin_claude-mem_mcp-search__search","description":"Step 1: Search memory. Returns index with IDs. Params: query, limit, project, type, obs_type, dateStart, dateEnd, offset, orderBy","input_schema":{"type":"object","properties":{},"additionalProperties":true}},{"name":"mcp__plugin_claude-mem_mcp-search__smart_outline","description":"Get structural outline of a file — shows all symbols (functions, classes, methods, types) with signatures but bodies folded. Much cheaper than reading the full file.","input_schema":{"type":"object","properties":{"file_path":{"type":"string","description":"Path to the source file"}},"required":["file_path"]}},{"name":"mcp__plugin_claude-mem_mcp-search__smart_search","description":"Search codebase for symbols, functions, classes using tree-sitter AST parsing. Returns folded structural views with token counts. Use path parameter to scope the search.","input_schema":{"type":"object","properties":{"query":{"type":"string","description":"Search term — matches against symbol names, file names, and file content"},"path":{"type":"string","description":"Root directory to search (default: current working directory)"},"max_results":{"type":"number","description":"Maximum results to return (default: 20)"},"file_pattern":{"type":"string","description":"Substring filter for file paths (e.g. \".ts\", \"src/services\")"}},"required":["query"]}},{"name":"mcp__plugin_claude-mem_mcp-search__smart_unfold","description":"Expand a specific symbol (function, class, method) from a file. Returns the full source code of just that symbol. Use after smart_search or smart_outline to read specific code.","input_schema":{"type":"object","properties":{"file_path":{"type":"string","description":"Path to the source file"},"symbol_name":{"type":"string","description":"Name of the symbol to unfold (function, class, method, etc.)"}},"required":["file_path","symbol_name"]}},{"name":"mcp__plugin_claude-mem_mcp-search__timeline","description":"Step 2: Get context around results. Params: anchor (observation ID) OR query (finds anchor automatically), depth_before, depth_after, project","input_schema":{"type":"object","properties":{},"additionalProperties":true}},{"name":"mcp__plugin_context7_context7__query-docs","description":"Retrieves and queries up-to-date documentation and code examples from Context7 for any programming library or framework.\n\nYou must call 'Resolve Context7 Library ID' tool first to obtain the exact Context7-compatible library ID required to use this tool, UNLESS the user explicitly provides a library ID in the format '/org/project' or '/org/project/version' in their query.\n\nDo not call this tool more than 3 times per question.","input_schema":{"type":"object","properties":{"libraryId":{"type":"string","description":"Exact Context7-compatible library ID (e.g., '/mongodb/docs', '/vercel/next.js', '/supabase/supabase', '/vercel/next.js/v14.3.0-canary.87') retrieved from 'resolve-library-id' or directly from user query in the format '/org/project' or '/org/project/version'."},"query":{"type":"string","description":"The question or task you need help with. Be specific and include relevant details. Good: 'How to set up authentication with JWT in Express.js' or 'React useEffect cleanup function examples'. Bad: 'auth' or 'hooks'. The query is sent to the Context7 API for processing. Do not include any sensitive or confidential information such as API keys, passwords, credentials, personal data, or proprietary code in your query."}},"required":["libraryId","query"],"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__plugin_context7_context7__resolve-library-id","description":"Resolves a package/product name to a Context7-compatible library ID and returns matching libraries.\n\nYou MUST call this function before 'Query Documentation' tool to obtain a valid Context7-compatible library ID UNLESS the user explicitly provides a library ID in the format '/org/project' or '/org/project/version' in their query.\n\nEach result includes:\n- Library ID: Context7-compatible identifier (format: /org/project)\n- Name: Library or package name\n- Description: Short summary\n- Code Snippets: Number of available code examples\n- Source Reputation: Authority indicator (High, Medium, Low, or Unknown)\n- Benchmark Score: Quality indicator (100 is the highest score)\n- Versions: List of versions if available. Use one of those versions if the user provides a version in their query. The format of the version is /org/project/version.\n\nFor best results, select libraries based on name match, source reputation, snippet coverage, benchmark score, and relevance to your use case.\n\nSelection Process:\n1. Analyze the query to understand what library/package the user is looking for\n2. Return the most relevant match based on:\n- Name similarity to the query (exact matches prioritized)\n- Description relevance to the query's intent\n- Documentation coverage (prioritize libraries with higher Code Snippet counts)\n- Source reputation (consider libraries with High or Medium reputation more authoritative)\n- Benchmark Score: Quality indicator (100 is the highest score)\n\nResponse Format:\n- Return the selected library ID in a clearly marked section\n- Provide a brief explanation for why this library was chosen\n- If multiple good matches exist, acknowledge this but proceed with the most relevant one\n- If no good matches exist, clearly state this and suggest query refinements\n\nFor ambiguous queries, request clarification before proceeding with a best-guess match.\n\nIMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best result you have.","input_schema":{"type":"object","properties":{"query":{"type":"string","description":"The question or task you need help with. This is used to rank library results by relevance to what the user is trying to accomplish. The query is sent to the Context7 API for processing. Do not include any sensitive or confidential information such as API keys, passwords, credentials, personal data, or proprietary code in your query."},"libraryName":{"type":"string","description":"Library name to search for and retrieve a Context7-compatible library ID. Use the official library name with proper punctuation — e.g., 'Next.js' instead of 'nextjs', 'Customer.io' instead of 'customerio', 'Three.js' instead of 'threejs'."}},"required":["query","libraryName"],"$schema":"http://json-schema.org/draft-07/schema#"}}],"metadata":{"user_id":"{\"device_id\":\"2654b8376e05d9c5a7b53cf885328d0befbd04d20594e167d14bd3dd486a3cb5\",\"account_uuid\":\"\",\"session_id\":\"4f9dd26b-4257-4b27-8ec5-b1d120106867\"}"},"max_tokens":32000,"output_config":{"effort":"high"},"stream":true}},"response":{"status":401,"headers":{"Date":"Mon, 11 May 2026 02:40:07 GMT","Content-Type":"application/json","x-should-retry":"false","request-id":"req_011Cav1RRDvAMJ53XM2UCjgr","strict-transport-security":"max-age=31536000; includeSubDomains; preload","Server":"cloudflare","x-envoy-upstream-service-time":"19","X-Robots-Tag":"none","Vary":"Accept-Encoding","cf-cache-status":"DYNAMIC","Set-Cookie":"_cfuvid=Zx6UiTOmnlJs.JmCgoHA._dOZE4DjIebmuiVJhZBpAs-1778467207.3106804-1.0.1.1-IEk_jFVadmVQQHFNiLZXl.2sealtotVpFEkl1CmFh1o; HttpOnly; SameSite=None; Secure; Path=/; Domain=api.anthropic.com","Content-Security-Policy":"default-src 'none'; frame-ancestors 'none'","CF-RAY":"9f9dd12da9a53b3d-BOM"},"body":{"type":"error function cloneJson(value) {

function isCodexResponsesWebSocketEntry(entry) {
  if (entry?.transport !== 'websocket') return false;

function getResponseIdFromEvent(event) {

function responseEventMatchesId(event, responseId) {
  if (!responseId) return false;
  const data = getEventData(event);
  if (data?.response?.id === responseId) return true;
  const itemId = data?.item?.id || data?.item_id || '';

function splitWebSocketResponseEvents(events) {
  const groups = [];
  let current = null;
  for (const event of events || []) {
    const type = getEventType(event);
    if (type === 'response.created') {
      if (current && current.events.length) groups.push(current);
      current = { responseId: getResponseIdFromEvent(event), events: [event] };
      continue;
    }
    if (!current) continue;
    if (responseEventMatchesId(event, current.responseId) || type.startsWith('response.')) {
      current.events.push(event);
    }
    if (type === 'response.completed') {
      groups.push(current);
      current = null;
    }

  if (current && current.events.length) groups.push(current);
  return groups.filter(group => group.events.some(event => getEventType(event) === 'response.completed'));

function completedResponseFromEvents(events) {
  for (let i = events.length - 1; i >= 0; i--) {

  return null;

function responseCreatedFromEvents(events) {

      if (!Array.isArray(namespace.tools)) continue;

function isResponseToolResultItem(item) {

  if (item?.type === 'tool_search_output') return toolSearchOutputContent(item);

function responseInputItemToMessage(item) {

function normalizeWebSocketDerivedInput(input) {

function webSocketOutputMessages(events) {
  const messages = [];
  const items = [];
  for (const event of events || []) {
    if (getEventType(event) !== 'response.output_item.done') continue;
    const data = getEventData(event);
    if (data?.item && Number.isInteger(data.output_index)) items.push({ outputIndex: data.output_index, item: data.item });
  }
  items.sort((a, b) => a.outputIndex - b.outputIndex);
  for (const { item } of items) {
    if (isResponseCallItem(item)) {
      messages.push({
        type: 'message',
        role: 'assistant',
        content: [{
          type: 'tool_use',
          id: item.call_id || item.id || '',
          name: responseCallToolName(item),
          input: responseCallInput(item)
        }]
      });
    } else if (item.type === 'message') {
      messages.push({
        type: 'message',
        role: item.role || 'assistant',
        content: Array.isArray(item.content) ? item.content : []

    }
  }
  return messages;
}

function isToolResultInputItem(item) {
  if (!item || typeof item !== 'object') return false;

function uniqueMessages(messages) {
  const seen = new Set();
  const unique = [];
  for (const message of messages) {
    let key;
    try { key = JSON.stringify(message); } catch(e) { key = String(message); }
    if (seen.has(key)) continue;
    seen.add(key);
    unique.push(message);

    ...(priorRequestBodies || []).flatMap(regularMessagesFromBody),

function detectLang() {
  const supported = ['en','zh-CN','ja','ko','fr','ar','de','ru'];
  const nav = navigator.language || navigator.userLanguage || 'en';
  if (supported.includes(nav)) return nav;
  const prefix = nav.split('-')[0];
  if (prefix === 'zh') return 'zh-CN';
  const match = supported.find(s => s.startsWith(prefix));
  return match || 'en';
}
let currentLang = localStorage.getItem('claude-tap-lang') || detectLang();
function t(key) { return (I18N[currentLang] || I18N.en)[key] || I18N.en[key] || key; }
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('claude-tap-lang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  $('#lang-select').value = lang;
  updateStaticTexts();
  if (filtered.length) { applyFilter(); selectEntry(activeIdx >= 0 ? activeIdx : 0); }
}
function updateStaticTexts() {
  const e = id => document.getElementById(id);
  if (e('logo-text')) e('logo-text').textContent = t('title');
  if (e('logo-version')) {
    const rawVersion = String(CLAUDE_TAP_VERSION || '').trim();
    if (rawVersion) {
      e('logo-version').textContent = rawVersion.startsWith('v') ? rawVersion : `v${rawVersion}`;
      e('logo-version').style.display = 'inline-flex';
    } else {
      e('logo-version').style.display = 'none';
    }
  }
  document.title = t('title') + ' Viewer';
  if (e('label-turns')) e('label-turns').textContent = t('stats_turns');
  const tokenLabel = e('label-tokens');
  if (tokenLabel) {
    tokenLabel.textContent = t('stats_tokens');
    if (tokenLabel.parentElement) {
      tokenLabel.parentElement.title = t('stats_tokens_hint');
      tokenLabel.parentElement.setAttribute('aria-label', t('stats_tokens_hint'));
    }
  }
  if (e('label-time')) e('label-time').textContent = t('stats_time');
  if (e('drop-title')) e('drop-title').textContent = t('drop_title');
  if (e('drop-desc')) e('drop-desc').textContent = t('drop_desc');
  if (e('drop-btn-label')) e('drop-btn-label').textContent = t('drop_btn');
  if (e('search-input')) e('search-input').placeholder = t('search_placeholder');
}

/* ─── Theme ─── */
function initTheme() {
  const saved = localStorage.getItem('claude-tap-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  applyTheme(theme);
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('claude-tap-theme', next);
}
function applyTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    $('#theme-toggle').textContent = '\u2600'; // sun
  } else {
    delete document.documentElement.dataset.theme;
    $('#theme-toggle').textContent = '\u263E'; // moon
  }
}

  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLang;
  $('#lang-select').value = currentLang;
  updateStaticTexts();
}
/* ─── Live Mode SSE Support ─── */
let liveEventSource = null;
let liveConnected = false;
let currentDetailRequestId = null;
let liveRecords = [];
let viewingDate = null; // null = live, string = historical date
let liveRenderTimer = null;
const liveSeenIds = new Set();

function initLiveMode() {
  const statusEl = $('#live-status');
  statusEl.style.display = 'flex';
  updateLiveStatus('connecting');

  liveEventSource = new EventSource('/events');

  liveEventSource.onopen = () => {
    liveConnected = true;
    updateLiveStatus('connected', liveRecords.length);
  };

  liveEventSource.onmessage = (event) => {
    try {
      const record = JSON.parse(event.data);
      // Deduplicate: SSE replays full history on each reconnect
      const id = record.request_id || record.req_id;
      if (id && liveSeenIds.has(id)) return;
      if (id) liveSeenIds.add(id);

      liveRecords.push(record);
      if (!viewingDate) {
        entries.push(...expandWebSocketResponseEntries([record]));
        updateLiveStatus('connected', entries.length);
        clearTimeout(liveRenderTimer);
        liveRenderTimer = setTimeout(() => renderApp(true), 50);
      }
    } catch (e) {
      console.error('Failed to parse SSE data:', e);
    }
  };

  // EventSource auto-reconnects on transient errors;
  // only update status indicator here.
  liveEventSource.onerror = () => {
    liveConnected = false;
    updateLiveStatus('disconnected');
  };
}

function updateLiveStatus(status, count) {
  const el = $('#live-status');
  if (!el) return;
  const colors = {
    connecting: { bg: 'var(--amber-bg)', color: 'var(--amber)', dot: 'var(--amber)' },
    connected: { bg: 'var(--green-bg)', color: 'var(--green)', dot: 'var(--green)' },
    disconnected: { bg: 'var(--red-bg)', color: 'var(--red)', dot: 'var(--red)' }
  };
  const c = colors[status] || colors.connecting;
  const labels = { connecting: 'Connecting...', connected: 'Live', disconnected: 'Disconnected' };
  const countText = count !== undefined ? ` (${count})` : '';
  el.style.background = c.bg;
  el.style.color = c.color;
  el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${c.dot};${status === 'connected' ? 'animation:pulse 2s infinite;' : ''}"></span>${labels[status]}${countText}`;
}

async function fetchDates() {
  try {
    const resp = await fetch('/api/dates');
    const data = await resp.json();
    const sel = $('#date-select');
    if (!sel || !data.dates) return;
    sel.innerHTML = '<option value="live">Live (current session)</option>';
    for (const d of data.dates) {
      sel.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`);
    }
    if (data.has_legacy) {
      sel.insertAdjacentHTML('beforeend', '<option value="legacy">Legacy (flat)</option>');
    }
    const picker = $('#date-picker');
    if (picker) picker.style.display = 'flex';
  } catch (e) {
    console.error('Failed to fetch dates:', e);
  }
}

async function onDateChange(value) {
  if (value === 'live') {
    viewingDate = null;
    entries = expandWebSocketResponseEntries(liveRecords.slice());
    renderApp(true);
    return;
  }
  viewingDate = value;
  try {
    const resp = await fetch('/api/traces/' + encodeURIComponent(value));
    entries = expandWebSocketResponseEntries(await resp.json());
    renderApp();
  } catch (e) {
    console.error('Failed to load traces for date:', value, e);
  }
}

if (typeof LIVE_MODE !== 'undefined' && LIVE_MODE) {
  entries = typeof EMBEDDED_TRACE_DATA !== 'undefined' ? expandWebSocketResponseEntries(EMBEDDED_TRACE_DATA) : [];
  document.addEventListener('DOMContentLoaded', () => {
    initTheme(); initLang(); initGlobalSearch();
    initLiveMode();
    fetchDates();
    if (entries.length) renderApp();
    else {
      // Show waiting state
      $('#drop-zone').innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:16px;">📡</div><h2 style="margin-bottom:8px;">Waiting for API calls...</h2><p style="color:var(--text-secondary);">Start using Claude Code to see traces here in real-time</p></div>';
    }
  });
} else if (typeof EMBEDDED_TRACE_META !== 'undefined' && EMBEDDED_TRACE_META.length) {
  // Lazy mode: build stub entries from metadata
  lazyMode = true;
  entries = EMBEDDED_TRACE_META.map((meta, i) => buildStubEntry(meta, i));
  document.addEventListener('DOMContentLoaded', () => { initTheme(); initLang(); initGlobalSearch(); renderApp(); });
} else if (typeof EMBEDDED_TRACE_DATA !== 'undefined' && EMBEDDED_TRACE_DATA.length) {
  entries = expandWebSocketResponseEntries(EMBEDDED_TRACE_DATA);
  document.addEventListener('DOMContentLoaded', () => { initTheme(); initLang(); initGlobalSearch(); renderApp(); });
} else {
  document.addEventListener('DOMContentLoaded', () => {
    initTheme(); initLang(); initGlobalSearch();
    const dropInner = $('#drop-inner'), fileInput = $('#file-input');
    ['dragover','dragenter'].forEach(e => dropInner.addEventListener(e, ev => { ev.preventDefault(); dropInner.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(e => dropInner.addEventListener(e, () => dropInner.classList.remove('dragover')));
    dropInner.addEventListener('drop', ev => { ev.preventDefault(); if (ev.dataTransfer.files.length) loadFile(ev.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });
  });
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    entries = expandWebSocketResponseEntries(reader.result.trim().split('\n').map(line => { try { return JSON.parse(line); } catch { return null; } }).filter(Boolean));
    if (!entries.length) { alert('No valid entries found / 未找到有效条目'); return; }
    renderApp();
  };
  reader.readAsText(file);
}

/* ─── Path & filter ─── */
function getPath(e) { return (e.request?.path || '/unknown').replace(/\?.*$/, ''); }

function renderApp(preserveDetail) {
  $('#drop-zone').style.display = 'none';
  $('#sidebar-wrap').style.display = 'flex';
  $('#detail').style.display = '';
  $('#stats').style.display = '';
  $('#path-filter').style.display = '';
  const pathCounts = {};
  entries.forEach(e => { const p = getPath(e); pathCounts[p] = (pathCounts[p] || 0) + 1; });
  const paths = Object.keys(pathCounts).sort();
  if (activePaths.size === 0) {
    /* If the trace has main conversation paths, hide auxiliary setup calls by default. */
    const primaryPaths = paths.filter(isPathPrimary);
    if (primaryPaths.length > 0) primaryPaths.forEach(p => activePaths.add(p));
    else paths.forEach(p => activePaths.add(p));
  }
  renderPathFilter(paths, pathCounts);
  renderTracePathBar();
  applyFilter(preserveDetail);
}

function renderTracePathBar() {
  const bar = $('#trace-path-bar');
  if (!TRACE_JSONL_PATH && !TRACE_HTML_PATH) return;
  const copyIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
  let html = '';
  if (TRACE_JSONL_PATH) {
    html += `<span class="tp-label">JSONL</span><span class="tp-val" title="${esc(TRACE_JSONL_PATH)}">${esc(TRACE_JSONL_PATH)}</span><button class="tp-copy" title="Copy path" onclick="copyPath('${esc(TRACE_JSONL_PATH)}',this)">${copyIcon}</button>`;
  }
  if (TRACE_JSONL_PATH && TRACE_HTML_PATH) html += '<span class="tp-sep"></span>';
  if (TRACE_HTML_PATH) {
    html += `<span class="tp-label">HTML</span><span class="tp-val" title="${esc(TRACE_HTML_PATH)}">${esc(TRACE_HTML_PATH)}</span><button class="tp-copy" title="Copy path" onclick="copyPath('${esc(TRACE_HTML_PATH)}',this)">${copyIcon}</button>`;
  }
  bar.innerHTML = html;
  bar.style.display = 'flex';
}
function copyPath(text, btn) {
  copyToClipboard(text, btn, '✓');
}

function getResponseStatus(e) {
  return Number(e?.response?.status || 0);
}

function getResponseErrorMessage(e) {
  const message = e?.response?.body?.error?.message;
  if (typeof message === 'string' && message.trim()) return message.trim();
  return 'Unknown error';
}

function onCopySuccess(btn, copiedLabel = null) {
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.textContent = copiedLabel || t('copied');
  setTimeout(() => { btn.innerHTML = orig; }, 1500);
}

function fallbackCopyText(text) {
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      ta.style.left = '-9999px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) resolve();
      else reject(new Error('execCommand(copy) failed'));
    } catch (err) {
      reject(err);
    }
  });
}

function writeClipboardText(text) {
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopyText(text));
  }
  return fallbackCopyText(text);
}

function copyToClipboard(text, btn, copiedLabel = null) {
  writeClipboardText(text).then(() => {
    onCopySuccess(btn, copiedLabel);
  }).catch(err => {
    console.error('Clipboard copy failed:', err);
    if (!btn) return;
    const orig = btn.innerHTML;
    btn.textContent = '!';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}

let pathFilterExpanded = false;

/*
 * Path priority tiers:
 *   primary   – core AI conversation endpoints, always visible
 *   secondary – useful auxiliary APIs (MCP, models, token counting), collapsed behind "+N more"
 *   noise     – plugin manifests, bot APIs, asset downloads, version checks — hidden by default
 */
const PRIMARY_PATH_PREFIXES = ['/v1/messages', '/v1/responses', '/backend-api/codex/responses', '/v1/chat/completions', '/v1/completions'];
const SECONDARY_PATH_PREFIXES = ['/v1/mcp', '/v1/models', '/v1/embeddings', '/v1/files', '/responses', '/models', '/chat/completions', '/completions', '/files', '/search', '/fetch', '/usages', '/feedback'];
function isBedrockInvokePath(p) {
  return p.startsWith('/model/') && (p.endsWith('/invoke') || p.endsWith('/invoke-with-response-stream'));
}
function pathTier(p) {
  if (isBedrockInvokePath(p)) return 0;
  if (PRIMARY_PATH_PREFIXES.some(pfx => p.startsWith(pfx))) return 0;
  if (SECONDARY_PATH_PREFIXES.some(pfx => p.startsWith(pfx))) return 1;
  return 2;
}
function isPathPrimary(p) { return pathTier(p) === 0; }

function renderPathFilter(paths, pathCounts) {
  const c = $('#path-filter'); c.innerHTML = '';
  const buckets = [[], [], []]; /* primary, secondary, noise */
  paths.forEach(p => buckets[pathTier(p)].push(p));
  buckets.forEach(b => b.sort((a, bb) => pathCounts[bb] - pathCounts[a]));

  /* Always show primary */
  buckets[0].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));

  const hiddenPaths = [...buckets[1], ...buckets[2]];
  if (hiddenPaths.length > 0) {
    if (pathFilterExpanded) {
      buckets[1].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));
      buckets[2].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));
    }
    const toggle = document.createElement('button');
    toggle.className = 'filter-chip-toggle';
    toggle.textContent = pathFilterExpanded ? t('filter_less') : `+${hiddenPaths.length} ${t('filter_more')}`;
    toggle.onclick = () => { pathFilterExpanded = !pathFilterExpanded; renderPathFilter(paths, pathCounts); };
    c.appendChild(toggle);
  }
}

function makeFilterChip(p, count) {
  const chip = document.createElement('button');
  chip.className = 'filter-chip' + (activePaths.has(p) ? ' active' : '');
  /* Truncate long paths: show last 40 chars with ellipsis */
  const label = p.length > 40 ? '\u2026' + p.slice(-39) : p;
  chip.innerHTML = `<span title="${esc(p)}">${esc(label)}</span><span class="chip-count">${count}</span>`;
  chip.title = p;
  chip.onclick = () => {
    if (activePaths.has(p)) activePaths.delete(p); else activePaths.add(p);
    if (activePaths.size === 0) activePaths.add(p);
    chip.classList.toggle('active');
    applyFilter();
  };
  return chip;
}

function applyFilter(preserveDetail) {
  filtered = entries.filter(e => activePaths.has(getPath(e)));
  if (searchQuery) filtered = filtered.filter(e => matchSearch(e, searchQuery));
  if (activeTools) {
    filtered = filtered.filter(e => {
      const ro = getResponseOutput(e);
      const rc = ro?.content;
      if (!Array.isArray(rc)) return false;
      return rc.some(b => b.type === 'tool_use' && activeTools.has(b.name));
    });
  }
  filtered.sort((a, b) => (a.turn || 0) - (b.turn || 0));
  let totalTokens = 0, totalDuration = 0;
  let sumInput = 0, sumOutput = 0, sumCacheRead = 0, sumCacheCreate = 0;
  filtered.forEach(e => {
    totalDuration += e.duration_ms || 0;
    const u = getUsage(e);
    if (u) {
      totalTokens += (u.input_tokens || 0) + (u.output_tokens || 0);
      sumInput += u.input_tokens || 0;
      sumOutput += u.output_tokens || 0;
      sumCacheRead += u.cache_read_input_tokens || 0;
      sumCacheCreate += u.cache_creation_input_tokens || 0;
    }
  });
  $('#stat-turns').textContent = filtered.length;
  $('#stat-tokens').textContent = totalTokens.toLocaleString();
  $('#stat-duration').textContent = fmtDuration(totalDuration);
  // Token breakdown in header
  if (totalTokens > 0) {
    $('#stat-input').textContent = sumInput.toLocaleString();
    $('#stat-input-group').style.display = 'flex';
    $('#stat-output').textContent = sumOutput.toLocaleString();
    $('#stat-output-group').style.display = 'flex';
    if (sumCacheRead) { $('#stat-cache-read').textContent = sumCacheRead.toLocaleString(); $('#stat-cache-read-group').style.display = 'flex'; }
    else { $('#stat-cache-read-group').style.display = 'none'; }
    if (sumCacheCreate) { $('#stat-cache-write').textContent = sumCacheCreate.toLocaleString(); $('#stat-cache-write-group').style.display = 'flex'; }
    else { $('#stat-cache-write-group').style.display = 'none'; }
  } else {
    ['stat-input-group','stat-output-group','stat-cache-read-group','stat-cache-write-group'].forEach(id => $('#'+id).style.display = 'none');
  }
  renderToolFilter();
  renderSidebar(preserveDetail);
  updatePositionIndicator();
}

function renderToolFilter() {
  const tf = $('#tool-filter');
  // Collect all tool names from all entries (not just filtered)
  const toolSet = new Set();
  entries.forEach(e => {
    if (e._isStub) {
      // Use stub's response content (already has tool_use blocks from metadata)
      const rc = e.response?.body?.content;
      if (Array.isArray(rc)) rc.forEach(b => { if (b.type === 'tool_use' && b.name) toolSet.add(b.name); });
    } else {
      const ro = getResponseOutput(e);
      const rc = ro?.content;
      if (Array.isArray(rc)) rc.forEach(b => { if (b.type === 'tool_use' && b.name) toolSet.add(b.name); });
    }
  });
  if (toolSet.size === 0) { tf.style.display = 'none'; return; }
  tf.style.display = '';
  const tools = [...toolSet].sort();
  tf.innerHTML = '<div style="margin-bottom:3px;font-weight:600;color:var(--text-secondary)">Tools</div>' +
    tools.map(name => {
      const active = activeTools ? activeTools.has(name) : false;
      return `<button class="filter-chip${active ? ' active' : ''}" style="font-size:10px;padding:2px 6px;margin:1px" onclick="toggleToolFilter('${name.replace(/'/g, "\\'")}')">${name}</button>`;
    }).join('') +
    (activeTools ? `<button class="filter-chip" style="font-size:10px;padding:2px 6px;margin:1px;color:var(--red)" onclick="clearToolFilter()">✕ Clear</button>` : '');
}
function toggleToolFilter(name) {
  if (!activeTools) activeTools = new Set();
  if (activeTools.has(name)) { activeTools.delete(name); if (activeTools.size === 0) activeTools = null; }
  else activeTools.add(name);
  applyFilter();
}
function clearToolFilter() { activeTools = null; applyFilter(); }

/* ─── Search ─── */
function onSearch(value) {
  searchQuery = value.toLowerCase().trim();
  $('#search-clear').style.display = searchQuery ? '' : 'none';
  applyFilter();
}
function clearSearch() {
  searchQuery = '';
  $('#search-input').value = '';
  $('#search-clear').style.display = 'none';
  applyFilter();
}
function matchSearch(e, q) {
  if (e._isStub) {
    // In lazy mode: search metadata fields only (fast, no parsing)
    const model = e.request?.body?.model || '';
    if (model.toLowerCase().includes(q)) return true;
    const path = e.request?.path || '';
    if (path.toLowerCase().includes(q)) return true;
    const sys = e.request?.body?.system || '';
    if (sys.toLowerCase().includes(q)) return true;
    const turn = String(e.turn || '');
    if (turn.includes(q)) return true;
    const tools = e.request?.body?.tools || [];
    for (const td of tools) {
      if (toolDisplayName(td).toLowerCase().includes(q)) return true;
    }
    const rc = e.response?.body?.content;
    if (Array.isArray(rc)) {
      for (const block of rc) {
        if ((block.name || '').toLowerCase().includes(q)) return true;
      }
    }
    return false;
  }
  const body = e.request?.body;
  if ((body?.model || '').toLowerCase().includes(q)) return true;
  const sys = extractSystem(body) || '';
  if (sys.toLowerCase().includes(q)) return true;
  const msgs = getMessages(body);
  for (const m of msgs) {
    const mc = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
    if (mc.toLowerCase().includes(q)) return true;
  }
  const tools = body?.tools || [];
  for (const td of tools) {
    if (toolDisplayName(td).toLowerCase().includes(q)) return true;
    if (toolDescription(td).toLowerCase().includes(q)) return true;
  }
  const ro = getResponseOutput(e);
  const rc = ro?.content;
  if (Array.isArray(rc)) {
    for (const block of rc) {
      if ((block.text || block.name || '').toLowerCase().includes(q)) return true;
    }
  }
  return false;
}

/* ─── Global search (Cmd/Ctrl+F) ─── */
function initGlobalSearch() {
  const input = $('#global-search-input');
  $('#global-search-prev').onclick = () => navigateGlobalSearch(-1);
  $('#global-search-next').onclick = () => navigateGlobalSearch(1);
  $('#global-search-close').onclick = () => closeGlobalSearch();
  input.addEventListener('input', () => {
    globalSearchState.query = input.value.trim();
    recalcGlobalSearchMatches();
  });
}

function openGlobalSearch() {
  normalizeFiltersForGlobalSearch();
  globalSearchState.open = true;
  $('#global-search-overlay').classList.add('open');
  const input = $('#global-search-input');
  input.value = globalSearchState.query;
  input.focus();
  input.select();
  recalcGlobalSearchMatches();
}

function closeGlobalSearch() {
  globalSearchState.open = false;
  globalSearchState.query = '';
  globalSearchState.matchCounts = [];
  globalSearchState.totalMatches = 0;
  globalSearchState.currentMatch = -1;
  $('#global-search-input').value = '';
  $('#global-search-overlay').classList.remove('open');
  clearGlobalSearchHighlights($('#detail'));
  updateGlobalSearchCount();
}

function normalizeFiltersForGlobalSearch() {
  // Global search must be able to move across all entries.
  let changed = false;
  const allPaths = new Set(entries.map(getPath));
  if (activePaths.size !== allPaths.size) { activePaths = allPaths; changed = true; }
  if (activeTools) { activeTools = null; changed = true; }
  if (searchQuery) {
    searchQuery = '';
    if ($('#search-input')) $('#search-input').value = '';
    if ($('#search-clear')) $('#search-clear').style.display = 'none';
    changed = true;
  }
  if (changed) applyFilter(true);
}

function getEntrySearchText(entry) {
  if (!entry?.request_id) return '';
  if (globalSearchState.textCache.has(entry.request_id)) return globalSearchState.textCache.get(entry.request_id);
  // For stubs, parse the full entry first
  const resolved = entry._isStub ? getFullEntry(entry) : entry;
  const body = resolved.request?.body;
  const parts = [];
  parts.push(body?.model || '');
  parts.push(extractSystem(body) || '');
  getMessages(body).forEach(m => parts.push(msgToText(m)));
  (body?.tools || []).forEach(td => parts.push(JSON.stringify(td)));
  const output = getResponseOutput(resolved);
  if (output?.content) parts.push(msgToText({ role: 'assistant', content: output.content }));
  getResponseEvents(resolved).forEach(ev => parts.push(JSON.stringify(ev)));
  parts.push(JSON.stringify(resolved));
  const text = parts.join('\n').toLowerCase();
  globalSearchState.textCache.set(entry.request_id, text);
  return text;
}

function countMatchesInText(text, query) {
  if (!text || !query) return 0;
  let count = 0, from = 0;
  while (true) {
    const idx = text.indexOf(query, from);
    if (idx === -1) break;
    count++;
    from = idx + query.length;
  }
  return count;
}

function recalcGlobalSearchMatches() {
  clearGlobalSearchHighlights($('#detail'));
  const query = globalSearchState.query.toLowerCase();
  if (!query) {
    globalSearchState.matchCounts = [];
    globalSearchState.totalMatches = 0;
    globalSearchState.currentMatch = -1;
    updateGlobalSearchCount();
    return;
  }
  const counts = [];
  let total = 0;
  entries.forEach(entry => {
    const c = countMatchesInText(getEntrySearchText(entry), query);
    if (c > 0) counts.push({ requestId: entry.request_id, count: c });
    total += c;
  });
  globalSearchState.matchCounts = counts;
  globalSearchState.totalMatches = total;
  globalSearchState.currentMatch = total > 0 ? 0 : -1;
  updateGlobalSearchCount();
  revealCurrentSearchMatch();
}

function updateGlobalSearchCount() {
  const total = globalSearchState.totalMatches;
  const current = total > 0 ? (globalSearchState.currentMatch + 1) : 0;
  const label = total > 0 ? `${current} of ${total} matches` : '0 of 0';
  $('#global-search-count').textContent = label;
}

function getTargetForGlobalMatch(globalIndex) {
  let seen = 0;
  for (const row of globalSearchState.matchCounts) {
    if (globalIndex < seen + row.count) {
      return { requestId: row.requestId, localIndex: globalIndex - seen };
    }
    seen += row.count;
  }
  return null;
}

function findFilteredIdxByRequestId(requestId) {
  return filtered.findIndex(entry => entry.request_id === requestId);
}

function ensureEntryVisibleForSearch(requestId) {
  let idx = findFilteredIdxByRequestId(requestId);
  if (idx < 0) {
    normalizeFiltersForGlobalSearch();
    idx = findFilteredIdxByRequestId(requestId);
  }
  if (idx < 0) return -1;
  const model = filtered[idx]?.request?.body?.model || 'unknown';
  if (collapsedGroups.has(model)) {
    collapsedGroups.delete(model);
    renderSidebar(true);
    idx = findFilteredIdxByRequestId(requestId);
  }
  return idx;
}

function navigateGlobalSearch(delta) {
  if (!globalSearchState.totalMatches) return;
  const total = globalSearchState.totalMatches;
  globalSearchState.currentMatch = (globalSearchState.currentMatch + delta + total) % total;
  updateGlobalSearchCount();
  revealCurrentSearchMatch();
}

function revealCurrentSearchMatch() {
  const target = getTargetForGlobalMatch(globalSearchState.currentMatch);
  if (!target) return;
  const filteredIdx = ensureEntryVisibleForSearch(target.requestId);
  if (filteredIdx < 0) return;
  selectEntry(filteredIdx);
  applyGlobalSearchHighlights(target.localIndex);
}

function applyGlobalSearchHighlights(targetLocalIndex) {
  const detail = $('#detail');
  if (!detail) return;
  clearGlobalSearchHighlights(detail);
  const query = globalSearchState.query.toLowerCase();
  if (!query) return;
  const marks = highlightSearchInContainer(detail, query);
  autoExpandSearchMatches(marks);
  if (!marks.length) return;
  let idx = targetLocalIndex;
  if (idx < 0 || idx >= marks.length) idx = 0;
  marks.forEach((mark, i) => mark.classList.toggle('current', i === idx));
  marks[idx].scrollIntoView({ block: 'center' });
}

function clearGlobalSearchHighlights(container) {
  if (!container) return;
  container.querySelectorAll('mark.global-search-hit').forEach(mark => {
    mark.replaceWith(document.createTextNode(mark.textContent || ''));
  });
  container.normalize();
}

function highlightSearchInContainer(container, query) {
  if (!query) return [];
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      const parent = node.parentElement;
      if (!parent) return NodeFilter.FILTER_REJECT;
      if (parent.closest('#global-search-overlay')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    },
  });
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  const marks = [];
  textNodes.forEach(node => {
    const value = node.nodeValue;
    const lower = value.toLowerCase();
    let from = 0;
    let found = lower.indexOf(query, from);
    if (found === -1) return;
    const frag = document.createDocumentFragment();
    while (found !== -1) {
      if (found > from) frag.appendChild(document.createTextNode(value.slice(from, found)));
      const mark = document.createElement('mark');
      mark.className = 'global-search-hit';
      mark.textContent = value.slice(found, found + query.length);
      frag.appendChild(mark);
      marks.push(mark);
      from = found + query.length;
      found = lower.indexOf(query, from);
    }
    if (from < value.length) frag.appendChild(document.createTextNode(value.slice(from)));
    node.parentNode.replaceChild(frag, node);
  });
  return marks;
}

function autoExpandSearchMatches(marks) {
  marks.forEach(mark => {
    const sectionBody = mark.closest('.section-body');
    if (sectionBody && !sectionBody.classList.contains('open')) {
      sectionBody.classList.add('open');
      sectionBody.previousElementSibling?.querySelector('.chevron')?.classList.add('open');
    }
    const toolBody = mark.closest('.tool-block-body');
    if (toolBody && !toolBody.classList.contains('open')) {
      toolBody.classList.add('open');
      toolBody.previousElementSibling?.querySelector('.tb-arrow')?.classList.add('open');
    }
  });
}

/* ─── Model helpers ─── */
function modelPriority(m) {
  const l = m.toLowerCase();
  if (l.includes('opus')) return 0;
  if (l.includes('sonnet')) return 1;
  if (l.includes('haiku')) return 3;
  return 2;
}
function modelColor(m) {
  const l = m.toLowerCase();
  if (l.includes('opus')) return 'var(--purple)';
  if (l.includes('sonnet')) return 'var(--blue)';
  if (l.includes('haiku')) return 'var(--green)';
  return 'var(--text-tertiary)';
}
function modelBadge(m) {
  const l = m.toLowerCase();
  if (l.includes('opus')) return { bg: 'var(--purple-bg)', fg: 'var(--purple)' };
  if (l.includes('sonnet')) return { bg: 'var(--blue-bg)', fg: 'var(--blue)' };
  if (l.includes('haiku')) return { bg: 'var(--green-bg)', fg: 'var(--green)' };
  return { bg: 'var(--bg)', fg: 'var(--text-tertiary)' };
}

/* ─── Visual order helpers ─── */
function buildVisualOrder() {
  if (virtualMode) {
    visualOrder = vsFilteredItems.map(item => item.idx);
    return;
  }
  visualOrder = [];
  document.querySelectorAll('.sidebar-item').forEach(el => {
    // Skip items whose parent container is collapsed (display: none)
    if (el.parentElement && el.parentElement.style.display === 'none') return;
    visualOrder.push(parseInt(el.dataset.idx));
  });
}

function visualNavigate(delta) {
  if (!visualOrder.length) return;
  const pos = visualOrder.indexOf(activeIdx);
  if (pos === -1) { selectEntry(visualOrder[0]); return; }
  const next = Math.max(0, Math.min(pos + delta, visualOrder.length - 1));
  selectEntry(visualOrder[next]);
}

/* ─── Sidebar ─── */
const collapsedGroups = new Set(); // Track collapsed model groups

/* ─── Task type fingerprinting ─── */
const TASK_COLORS = [
  { color: 'var(--blue)',   bg: 'var(--blue-bg)' },
  { color: 'var(--green)',  bg: 'var(--green-bg)' },
  { color: 'var(--purple)', bg: 'var(--purple-bg)' },
  { color: 'var(--amber)',  bg: 'var(--amber-bg)' },
  { color: 'var(--cyan)',   bg: 'var(--cyan-bg)' },
  { color: 'var(--orange)', bg: 'var(--orange-bg)' },
  { color: 'var(--red)',    bg: 'var(--red-bg)' },
  { color: 'var(--indigo)', bg: 'var(--purple-bg)' },
];
const taskFingerprintCache = new Map();

function getTaskFingerprint(e) {
  const rid = e.request_id;
  if (taskFingerprintCache.has(rid)) return taskFingerprintCache.get(rid);
  const body = e.request?.body;
  if (!body) { taskFingerprintCache.set(rid, null); return null; }
  // Extract full system prompt text
  let sysText = '';
  if (typeof body.system === 'string') sysText = body.system;
  else if (Array.isArray(body.system)) {
    sysText = body.system.map(s => typeof s === 'string' ? s : (s.text || '')).join('\n');
  } else if (typeof body.instructions === 'string') {
    sysText = body.instructions;
  }
  // Tool names sorted for stable fingerprint
  const tools = body.tools || [];
  const toolKey = tools.map(toolDisplayName).sort().join(',');
  // Build fingerprint from full system prompt + tool set
  const fp = sysText + '|' + toolKey;
  // Derive a short label from system prompt content
  const lower = sysText.toLowerCase();
  let label = '';
  if (!sysText && !tools.length) label = 'simple';
  // Self-identification phrases ("You are X") win over generic substring matches,
  // since other agents may mention "Claude Code" inside their own prompt body.
  else if (lower.includes('you are opencode')) label = 'OpenCode';
  else if (lower.includes('you are codex')) label = 'Codex';
  else if (lower.includes('claude code')) label = 'Claude Code';
  else if (lower.includes('claude agent')) label = 'Claude Agent';
  else if (lower.includes('openclaw')) label = 'OpenClaw';
  else if (lower.includes('subagent') || lower.includes('sub-agent')) label = 'Subagent';
  else if (lower.includes('bash')) label = 'Bash';
  else if (lower.includes('explore')) label = 'Explore';
  else if (lower.includes('plan')) label = 'Plan';
  else if (sysText) {
    const firstLine = sysText.split('\n').find(l => {
      const line = l.trim().toLowerCase();
      return line && !line.startsWith('x-anthropic-billing-header:');
    }) || '';
    label = firstLine.slice(0, 20).trim() || (tools.length + ' tools');
  } else {
    label = tools.length + ' tools';
  }
  const result = { fp, label };
  taskFingerprintCache.set(rid, result);
  return result;
}

function getTaskColor(fp) {
  if (!fp) return TASK_COLORS[0];
  // Hash with sampling for long strings (system prompts can be very large)
  let hash = 0;
  const step = fp.length > 1000 ? Math.floor(fp.length / 500) : 1;
  for (let i = 0; i < fp.length; i += step) hash = ((hash << 5) - hash + fp.charCodeAt(i)) | 0;
  hash = ((hash << 5) - hash + fp.length) | 0; // include length for extra differentiation
  return TASK_COLORS[Math.abs(hash) % TASK_COLORS.length];
}

function createSidebarItem(e, i) {
  const item = document.createElement('div');
  const statusCode = getResponseStatus(e);
  const failed = statusCode >= 400;
  item.className = 'sidebar-item' + (failed ? ' is-error' : '');
  item.dataset.idx = i;
  const u = getUsage(e);
  const inTok = u?.input_tokens || 0, outTok = u?.output_tokens || 0;
  const model = e.request?.body?.model || '';
  const shortModel = model.replace(/^claude-/, '').replace(/-\d{8}$/, '');
  const badge = modelBadge(model);
  const timeStr = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '';
  // Task type coloring
  const taskInfo = getTaskFingerprint(e);
  const taskColor = taskInfo ? getTaskColor(taskInfo.fp) : TASK_COLORS[0];
  item.style.borderLeftColor = failed ? 'var(--red)' : taskColor.color;
  const taskBadgeHtml = taskInfo && taskInfo.label ? `<span class="si-task" style="background:${taskColor.bg};color:${taskColor.color}" title="${esc(taskInfo.label)}">${esc(taskInfo.label)}</span>` : '';
  const errorDot = failed ? `<span class="si-error-dot" title="HTTP ${statusCode}"></span>` : '';
  item.innerHTML = `
    <div class="si-row1">
      <span class="si-turn-wrap"><span class="si-turn">${t('turn')} ${e.turn || '?'}</span>${errorDot}</span>
      ${taskBadgeHtml}
      <span class="si-model" style="background:${badge.bg};color:${badge.fg}">${esc(shortModel)}</span>
    </div>
    <div class="si-row2">
      <span class="si-tok">${(inTok + outTok).toLocaleString()} ${t('tok')}</span>
      <span class="si-dur">${fmtDuration(e.duration_ms || 0)}</span>
      <span class="si-time">${esc(timeStr)}</span>
    </div>
    <div class="si-path">${esc((e.request?.method || '') + ' ' + (e.request?.path || ''))}</div>`;
  item.onclick = () => selectEntry(i);
  return item;
}

function renderSidebar(preserveDetail) {
  const sb = $('#sidebar');
  const prevScrollTop = sb.scrollTop;

  // Use virtual scroll for large filtered sets
  if (filtered.length > LAZY_THRESHOLD) {
    virtualMode = true;
    sb.classList.add('virtual-scroll');
    vsFilteredItems = filtered.map((e, i) => ({ entry: e, idx: i }));
    visualOrder = vsFilteredItems.map(item => item.idx);
    vsInitSidebar(sb, prevScrollTop, preserveDetail);
    return;
  }

  // Standard DOM-based sidebar for small traces
  virtualMode = false;
  sb.classList.remove('virtual-scroll');
  sb.innerHTML = '';
  const groups = new Map();
  filtered.forEach((e, i) => {
    const model = e.request?.body?.model || 'unknown';
    if (!groups.has(model)) groups.set(model, []);
    groups.get(model).push({ entry: e, idx: i });
  });
  const sorted = [...groups.keys()].sort((a, b) => {
    const pa = modelPriority(a), pb = modelPriority(b);
    return pa !== pb ? pa - pb : a.localeCompare(b);
  });
  if (sorted.length <= 1) {
    // Insert time gap indicators between entries
    let lastTs = null;
    filtered.forEach((e, i) => {
      const gap = _timeGapHtml(e, lastTs);
      if (gap) sb.insertAdjacentHTML('beforeend', gap);
      lastTs = e.timestamp ? new Date(e.timestamp).getTime() : null;
      sb.appendChild(createSidebarItem(e, i));
    });
  } else {
    sorted.forEach(model => {
      const items = groups.get(model);
      const shortModel = model.replace(/^claude-/, '').replace(/-\d{8}$/, '');
      const color = modelColor(model);
      const isCollapsed = collapsedGroups.has(model);
      const header = document.createElement('div');
      header.className = 'sidebar-group-header';
      header.innerHTML = `<span class="group-dot" style="background:${color}"></span><span class="group-name">${esc(shortModel)}</span><span class="group-count">${items.length}</span><span class="group-chevron${isCollapsed ? '' : ' open'}">&#9654;</span>`;
      const content = document.createElement('div');
      if (isCollapsed) content.style.display = 'none';
      items.forEach(({ entry: e, idx: i }) => content.appendChild(createSidebarItem(e, i)));
      header.onclick = () => {
        const nowCollapsed = content.style.display !== 'none';
        content.style.display = nowCollapsed ? 'none' : '';
        header.querySelector('.group-chevron').classList.toggle('open');
        if (nowCollapsed) collapsedGroups.add(model); else collapsedGroups.delete(model);
        buildVisualOrder();
        updateMobileNav();
      };
      sb.appendChild(header);
      sb.appendChild(content);
    });
  }
  buildVisualOrder();
  _restoreSelection(preserveDetail);
  if (preserveDetail) sb.scrollTop = prevScrollTop;
}

function _restoreSelection(preserveDetail) {
  let restoredIdx = -1;
  if (preserveDetail && currentDetailRequestId) {
    restoredIdx = filtered.findIndex(e => e.request_id === currentDetailRequestId);
  }
  if (restoredIdx >= 0) {
    selectEntry(restoredIdx, { force: false });
  } else if (activeIdx >= 0 && activeIdx < filtered.length) {
    selectEntry(activeIdx, { force: !preserveDetail });
  } else if (filtered.length) {
    let defaultIdx = 0;
    for (let i = 0; i < filtered.length; i++) {
      const m = (filtered[i].request?.body?.model || '').toLowerCase();
      if (m.includes('opus') || m.includes('sonnet')) { defaultIdx = i; break; }
    }
    selectEntry(defaultIdx);
  } else {
    activeIdx = -1; $('#detail').innerHTML = `<div class="empty-state">${t('empty_state')}</div>`;
  }
}

/* ─── Time gap indicator ─── */
function _timeGapHtml(entry, lastTs) {
  if (!lastTs || !entry.timestamp) return '';
  const ts = new Date(entry.timestamp).getTime();
  const gapMs = ts - lastTs;
  if (gapMs < 60000) return ''; // less than 1 min
  let label;
  if (gapMs < 3600000) label = Math.round(gapMs / 60000) + ' min gap';
  else label = (gapMs / 3600000).toFixed(1) + ' hr gap';
  return `<div class="time-gap"><span class="tg-line"></span>${label}<span class="tg-line"></span></div>`;
}

/* ─── Position indicator ─── */
function updatePositionIndicator() {
  const pi = $('#position-indicator');
  if (!pi) return;
  if (!filtered.length || activeIdx < 0) {
    pi.style.display = 'none';
    return;
  }
  pi.style.display = 'flex';
  const entry = filtered[activeIdx];
  const turnNum = entry.turn || (activeIdx + 1);
  const pos = activeIdx + 1;
  const total = filtered.length;
  const pct = total > 1 ? ((pos - 1) / (total - 1)) * 100 : 0;
  $('#pi-current').textContent = turnNum;
  $('#pi-total').textContent = `of ${total}`;
  $('#pi-fill').style.width = pct + '%';
}

/* ─── Virtual scroll ─── */
let _vsRafPending = false;

function vsInitSidebar(sb, prevScrollTop, preserveDetail) {
  sb.innerHTML = '';
  const spacer = document.createElement('div');
  spacer.className = 'vs-spacer';
  spacer.style.height = (vsFilteredItems.length * VS_ITEM_HEIGHT) + 'px';
  sb.appendChild(spacer);

  // Throttled scroll handler
  sb.onscroll = () => {
    if (!_vsRafPending) {
      _vsRafPending = true;
      requestAnimationFrame(() => {
        _vsRafPending = false;
        vsRenderVisible();
      });
    }
  };

  if (preserveDetail) sb.scrollTop = prevScrollTop;
  vsRenderVisible();
  _restoreSelection(preserveDetail);
}

function vsRenderVisible() {
  const sb = $('#sidebar');
  if (!sb) return;
  const spacer = sb.querySelector('.vs-spacer');
  if (!spacer) return;

  const scrollTop = sb.scrollTop;
  const viewHeight = sb.clientHeight;
  const startIdx = Math.max(0, Math.floor(scrollTop / VS_ITEM_HEIGHT) - VS_BUFFER);
  const endIdx = Math.min(vsFilteredItems.length, Math.ceil((scrollTop + viewHeight) / VS_ITEM_HEIGHT) + VS_BUFFER);

  // Collect existing rendered items
  const existing = new Map();
  spacer.querySelectorAll('.sidebar-item').forEach(el => {
    existing.set(parseInt(el.dataset.idx), el);
  });

  const needed = new Set();
  for (let i = startIdx; i < endIdx; i++) {
    needed.add(vsFilteredItems[i].idx);
  }

  // Remove items no longer visible
  existing.forEach((el, idx) => {
    if (!needed.has(idx)) el.remove();
  });

  // Add missing items
  for (let i = startIdx; i < endIdx; i++) {
    const { entry, idx } = vsFilteredItems[i];
    if (existing.has(idx)) {
      // Update active state
      existing.get(idx).classList.toggle('active', idx === activeIdx);
      continue;
    }
    const item = createSidebarItem(entry, idx);
    item.style.position = 'absolute';
    item.style.top = (i * VS_ITEM_HEIGHT) + 'px';
    item.style.height = VS_ITEM_HEIGHT + 'px';
    item.classList.toggle('active', idx === activeIdx);
    spacer.appendChild(item);
  }
}

function vsScrollToIdx(idx) {
  const sb = $('#sidebar');
  if (!sb || !virtualMode) return;
  const pos = vsFilteredItems.findIndex(item => item.idx === idx);
  if (pos < 0) return;
  const itemTop = pos * VS_ITEM_HEIGHT;
  const itemBottom = itemTop + VS_ITEM_HEIGHT;
  if (itemTop < sb.scrollTop) {
    sb.scrollTop = itemTop;
  } else if (itemBottom > sb.scrollTop + sb.clientHeight) {
    sb.scrollTop = itemBottom - sb.clientHeight;
  }
}

function selectEntry(idx, opts) {
  if (idx < 0 || idx >= filtered.length) return;
  const force = !opts || opts.force !== false;
  activeIdx = idx;
  if (virtualMode) {
    vsRenderVisible();
  } else {
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
    });
  }
  // Skip re-render if same entry and force=false (preserves scroll position in live mode)
  if (!force && currentDetailRequestId === filtered[idx].request_id) {
    // Just update sidebar highlight, keep detail as-is
  } else {
    const entry = filtered[idx];
    const resolved = entry._isStub ? getFullEntry(entry) : entry;
    renderDetail(resolved);
  }
  if (virtualMode) {
    vsScrollToIdx(idx);
  } else {
    const active = document.querySelector('.sidebar-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }
  updatePositionIndicator();
  mobileShowDetail();
  updateMobileNav();
}

/* ─── Detail ─── */
// Persist section collapse state across turn switches.
// Key: section title text, Value: true = open, false = collapsed.
const sectionCollapseState = {};

function saveSectionStates() {
  const d = $('#detail');
  if (!d) return;
  d.querySelectorAll('.section').forEach(sec => {
    const titleEl = sec.querySelector('.section-header .title');
    const bodyEl = sec.querySelector('.section-body');
    if (titleEl && bodyEl) {
      sectionCollapseState[titleEl.textContent] = bodyEl.classList.contains('open');
    }
  });
}

function restoreSectionStates() {
  const d = $('#detail');
  if (!d) return;
  d.querySelectorAll('.section').forEach(sec => {
    const titleEl = sec.querySelector('.section-header .title');
    const bodyEl = sec.querySelector('.section-body');
    const chevron = sec.querySelector('.chevron');
    if (!titleEl || !bodyEl || !chevron) return;
    const key = titleEl.textContent;
    if (key in sectionCollapseState) {
      const shouldBeOpen = sectionCollapseState[key];
      if (shouldBeOpen && !bodyEl.classList.contains('open')) {
        bodyEl.classList.add('open');
        chevron.classList.add('open');
      } else if (!shouldBeOpen && bodyEl.classList.contains('open')) {
        bodyEl.classList.remove('open');
        chevron.classList.remove('open');
      }
    }
  });
}

function renderDetail(e) {
  saveSectionStates();
  currentDetailRequestId = e.request_id;
  const d = $('#detail');
  const reqBody = e.request?.body, respBody = e.response?.body, usage = getUsage(e);
  const statusCode = getResponseStatus(e);
  const isError = statusCode >= 400;
  const errorMessage = getResponseErrorMessage(e);
  let html = '';

  if (isError) {
    html += `<div class="error-banner"><div class="eb-icon">&#9888;</div><div class="eb-content"><div class="eb-title">HTTP ${statusCode}</div><div class="eb-message">${esc(errorMessage)}</div></div></div>`;
  }
  const continuation = getResponsesContinuationInfo(e);
  if (continuation) html += renderResponsesContinuationNotice(continuation);

  // Action bar
  html += `<div class="action-bar">
    <button class="act-btn" onclick="copyRequestBody(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>${t('btn_request_json')}</button>
    <button class="act-btn" onclick="copyCurl(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>${t('btn_curl')}</button>
    <button class="act-btn" onclick="showDiff(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/><path d="M3 6h18M3 18h18" opacity=".4"/></svg>${t('btn_diff')}</button>
  </div>`;

  if (usage) html += renderTokenUsage(usage);

  const tools = reqBody?.tools;
  if (tools && tools.length) html += section(t('section_tools'), renderTools(tools), false, null, tools.length + ' ' + t('badge_tools'));

  const sysPrompt = extractSystem(reqBody);
  if (sysPrompt) html += section(t('section_system'), renderSystemPrompt(sysPrompt), true, sysPrompt);

  const respOutput = getResponseOutput(e);
  const msgs = getMessages(reqBody);
  const contextOnly = shouldRenderRequestContext(e, reqBody, msgs, respOutput);
  if (msgs && msgs.length) {
    const title = contextOnly ? t('section_context') : t('section_messages');
    html += section(title, renderMessages(msgs), true, null, msgs.length + ' ' + t('badge_messages'));
  }

  if (respOutput?.content || contextOnly) html += section(t('section_response'), renderResponseContent(respOutput, contextOnly), true);

  const streamEvents = getResponseEvents(e);
  if (streamEvents.length) html += section(t('section_sse'), renderSSEEvents(streamEvents), false, null, streamEvents.length + ' ' + t('badge_events'));

  html += section(t('section_json'), `<div class="json-view">${syntaxHL(e)}</div>`, false, JSON.stringify(e, null, 2));

  d.innerHTML = html;
  bindSections(d);
  restoreSectionStates();
  if (globalSearchState.open && globalSearchState.query) {
    const target = getTargetForGlobalMatch(globalSearchState.currentMatch);
    const localIndex = target && target.requestId === e.request_id ? target.localIndex : 0;
    applyGlobalSearchHighlights(localIndex);
  }
}

/* ─── Renderers ─── */
function chatMessageContentToText(content) {
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    return content.map(part => {
      if (typeof part === 'string') return part;
      if (!part || typeof part !== 'object') return '';
      if (part.type === 'text' || part.type === 'input_text' || part.type === 'output_text') return part.text || '';
      if (typeof part.text === 'string') return part.text;
      return JSON.stringify(part);
    }).filter(Boolean).join('\n');
  }
  if (content === undefined || content === null) return '';
  return JSON.stringify(content);
}

function isChatInstructionRole(role) {
  return role === 'system' || role === 'developer';
}

function chatInstructionMessages(body) {
  if (!Array.isArray(body?.messages)) return [];
  return body.messages.filter(m => m && isChatInstructionRole(m.role));
}

function parseToolCallArguments(args) {
  if (args === undefined || args === null || args === '') return {};
  if (typeof args !== 'string') return args;
  try { return JSON.parse(args); } catch(e) { return args; }
}

function chatToolCallToContentBlock(call) {
  const fn = call?.function || {};
  return {
    type: 'tool_use',
    id: call?.id || '',
    name: fn.name || call?.name || 'tool_use',
    input: parseToolCallArguments(fn.arguments),
  };
}

function normalizeChatMessageForDisplay(msg) {
  if (!msg || typeof msg !== 'object') return { role: 'unknown', content: '' };
  const role = msg.role || 'unknown';
  if (role === 'tool') {
    return {
      ...msg,
      content: [{ type: 'tool_result', tool_use_id: msg.tool_call_id || '', content: msg.content || '' }],
    };
  }
  const content = [];
  if (Array.isArray(msg.content)) content.push(...msg.content);
  else if (typeof msg.content === 'string') {
    if (msg.content.trim()) content.push({ type: 'text', text: msg.content });
  } else if (msg.content !== undefined && msg.content !== null) {
    content.push(msg.content);
  }
  if (Array.isArray(msg.tool_calls)) {
    content.push(...msg.tool_calls.map(chatToolCallToContentBlock));
  }
  return { ...msg, content };
}

function hasDisplayContent(content) {
  if (typeof content === 'string') return content.trim().length > 0;
  if (!Array.isArray(content)) return content !== undefined && content !== null;
  return content.some(block => {
    if (!block || typeof block !== 'object') return false;
    if (block.type === 'text' || block.type === 'input_text' || block.type === 'output_text') return !!(block.text || '').trim();
    if (block.type === 'thinking') return !!(block.thinking || '').trim();
    if (block.type === 'tool_use') return true;
    if (block.type === 'tool_result') {
      const rc = block.content;
      if (typeof rc === 'string') return rc.trim().length > 0 || !!block.tool_use_id;
      if (Array.isArray(rc)) return rc.length > 0;
      return rc !== undefined && rc !== null;
    }
    return JSON.stringify(block) !== '{}';
  });
}

function extractSystem(body) {
  if (!body) return null;
  const parts = [];
  if (typeof body.system === 'string' && body.system.trim()) parts.push(body.system);
  if (Array.isArray(body.system)) {
    const systemText = body.system.map(b => typeof b === 'string' ? b : b.type === 'text' ? (b.text || '') : JSON.stringify(b)).filter(Boolean).join('\n\n');
    if (systemText.trim()) parts.push(systemText);
  }
  // Responses API: instructions field holds the system prompt
  if (typeof body.instructions === 'string' && body.instructions.trim()) parts.push(body.instructions);
  const chatInstructions = chatInstructionMessages(body)
    .map(m => chatMessageContentToText(m.content))
    .filter(text => text.trim());
  parts.push(...chatInstructions);
  return parts.length ? parts.join('\n\n') : null;
}

function getResponseEvents(entry) {
  const sse = entry?.response?.sse_events;
  if (Array.isArray(sse) && sse.length > 0) return sse;
  const ws = entry?.response?.ws_events;
  return Array.isArray(ws) ? ws : [];
}

function getEventType(event) {
  if (!event || typeof event !== 'object') return '';
  return typeof event.event === 'string' ? event.event : (typeof event.type === 'string' ? event.type : '');
}

function getEventData(event) {
  if (!event || typeof event !== 'object') return null;
  let data = Object.prototype.hasOwnProperty.call(event, 'data') ? event.data : event;
  if (typeof data === 'string') {
    try { data = JSON.parse(data); } catch(e) { return null; }
  }
  return data && typeof data === 'object' ? data : null;
}

function getResponsePayload(entry) {
  const body = entry?.response?.body;
  if (body && typeof body === 'object') return body;
  const response = entry?.response;
  if (!response || typeof response !== 'object') return null;
  if (response.output || response.content || response.usage || response.previous_response_id || response.id || response.error) return response;
  return null;
}

function getResponsesContinuationInfo(entry) {
  if (entry?.derived_from_websocket) return null;
  const body = entry?.request?.body;
  if (!body || typeof body !== 'object') return null;
  const path = entry?.request?.path || '';
  const looksLikeResponses = path.endsWith('/v1/responses') || path === '/responses' || body.type === 'response.create' || Array.isArray(body.input);
  if (!looksLikeResponses) return null;
  const payload = getResponsePayload(entry) || {};
  const previousId = payload.previous_response_id || body.previous_response_id;
  if (!previousId) return null;
  const userMessages = getMessages(body).filter(m => m.role === 'user');
  if (userMessages.length > 0) return null;
  const headers = entry?.request?.headers || {};
  return {
    response_id: payload.id || '',
    previous_response_id: previousId,
    prompt_cache_key: body.prompt_cache_key || '',
    session_id: headers.session_id || headers['session-id'] || '',
    codex_version: headers.version || headers['x-codex-version'] || '',
  };
}

// Normalize messages from Chat Completions (body.messages) or Responses API (body.input)
function getMessages(body) {
  if (!body) return [];
  if (Array.isArray(body.messages) && body.messages.length > 0) {
    return body.messages
      .filter(m => !isChatInstructionRole(m?.role))
      .map(normalizeChatMessageForDisplay)
      .filter(m => hasDisplayContent(m.content));
  }
  if (Array.isArray(body.input)) {
    const normalizedInput = normalizeWebSocketDerivedInput(body.input);
    const messages = normalizedInput.filter(item => {
      if (!item || typeof item !== 'object') return false;
      if (typeof item.role !== 'string' || !item.role) return false;
      return item.type === undefined || item.type === 'message';
    }).map(item => ({
      role: item.role || 'user',
      content: Array.isArray(item.content)
        ? item.content.map(c => {
            if (!c || typeof c !== 'object') return c;
            if (c.type === 'input_text' || c.type === 'output_text' || c.type === 'text') return { type: 'text', text: c.text };
            if (c.type === 'tool_use') return c;
            if (c.type === 'tool_result') return c;
            return c;
          })
        : item.content
    }));
    const hasDeveloperMessage = messages.some(m => m.role === 'developer' || m.role === 'system');
    if (!hasDeveloperMessage && typeof body.instructions === 'string' && body.instructions.trim()) {
      return [{ role: 'developer', content: [{ type: 'text', text: body.instructions }] }, ...messages];
    }
    return messages;
  }
  return [];
}

function shouldRenderRequestContext(entry, body, msgs, respOutput) {
  if (!entry || !body || !Array.isArray(msgs) || msgs.length === 0) return false;
  const path = getPath(entry);
  if (!path.includes('/codex/responses')) return false;
  if (!Array.isArray(body.input) || body.input.length === 0) return false;
  return true;
}

function normalizeUsage(usage) {
  if (!usage || typeof usage !== 'object') return null;
  const normalized = { ...usage };
  if (normalized.input_tokens === undefined && usage.prompt_tokens !== undefined) {
    normalized.input_tokens = usage.prompt_tokens;
  }
  if (normalized.output_tokens === undefined && usage.completion_tokens !== undefined) {
    normalized.output_tokens = usage.completion_tokens;
  }
  if (normalized.cache_read_input_tokens === undefined) {
    let cached = usage.cached_tokens;
    if (cached === undefined && usage.input_tokens_details && typeof usage.input_tokens_details === 'object') {
      cached = usage.input_tokens_details.cached_tokens;
    }
    if (cached === undefined && usage.prompt_tokens_details && typeof usage.prompt_tokens_details === 'object') {
      cached = usage.prompt_tokens_details.cached_tokens;
    }
    if (cached !== undefined && cached !== null) {
      normalized.cache_read_input_tokens = cached;
    }
  }
  return normalized;
}

// Extract token usage from response.body.usage or SSE response.completed event
function getUsage(entry) {
  const u = getResponsePayload(entry)?.usage;
  if (u) return normalizeUsage(u);
  const events = getResponseEvents(entry);
  for (let i = events.length - 1; i >= 0; i--) {
    if (getEventType(events[i]) !== 'response.completed') continue;
    const data = getEventData(events[i]);
    if (data?.response?.usage) return normalizeUsage(data.response.usage);
  }
  return null;
}

function normalizeResponseOutput(output) {
  if (!Array.isArray(output) || output.length === 0) return null;
  const content = [];
  for (const item of output) {
    if (!item || typeof item !== 'object') continue;
    if (item.type === 'message' && Array.isArray(item.content)) {
      for (const c of item.content) {
        if (c?.type === 'output_text') content.push({ type: 'text', text: c.text });
        else content.push(c);
      }
    } else if (isResponseCallItem(item)) {
      content.push({ type: 'tool_use', name: responseCallToolName(item), input: responseCallInput(item) });
    } else if (item.type === 'reasoning') {
      if (!item.summary) continue;
      const summaryText = Array.isArray(item.summary) ? item.summary.map(s => s?.text || '').join('\n') : (item.summary.text || JSON.stringify(item.summary));
      if (summaryText.trim()) content.push({ type: 'thinking', thinking: summaryText });
    }
  }
  return content.length > 0 ? { content } : null;
}

function reconstructOutputFromEvents(events) {
  if (!Array.isArray(events) || events.length === 0) return null;
  const outputItems = [];
  for (const ev of events) {
    if (getEventType(ev) !== 'response.output_item.done') continue;
    const data = getEventData(ev);
    const item = data?.item;
    const outputIndex = data?.output_index;
    if (!item || typeof item !== 'object' || !Number.isInteger(outputIndex)) continue;
    outputItems.push({ outputIndex, item });
  }
  if (outputItems.length === 0) return null;
  return normalizeResponseOutput(
    outputItems
      .sort((a, b) => a.outputIndex - b.outputIndex)
      .map(({ item }) => item)
  );
}

// Extract response output from response.body.content or SSE response.completed event
function getResponseOutput(entry) {
  const body = getResponsePayload(entry);
  if (body?.content) return body;
  const fromBody = normalizeResponseOutput(body?.output);
  if (fromBody) return fromBody;
  const events = getResponseEvents(entry);
  const fromItems = reconstructOutputFromEvents(events);
  if (fromItems) return fromItems;
  for (let i = events.length - 1; i >= 0; i--) {
    if (getEventType(events[i]) !== 'response.completed') continue;
    const data = getEventData(events[i]);
    const normalized = normalizeResponseOutput(data?.response?.output);
    if (normalized) return normalized;
  }
  return null;
}

function renderContent(content, role) {

    if (block.type === 'tool_result') {

      if (typeof rc === 'string') return `<div class="content-block"><span class="tool-use-label">result (${esc(block.tool_use_id || '')})</span><div class="pre-text">${esc(rc)}</div></div>`;
      if (Array.isArray(rc)) {

            if (s.type === 'url' && s.url) return `<img src="${esc(s.url)}" style="max-width:100%;border-radius:6px;border:1px solid var(--border);" />`;
          }
          return `<pre>${esc(JSON.stringify(c))}</pre>`;
        }).join('');
        return `<div class="content-block"><span class="tool-use-label">result</span>${parts}</div>`;
      }
      return `<div class="content-block"><pre>${esc(JSON.stringify(block, null, 2))}</pre></div>`;
    }
    if (block.type === 'image') {
      const src = block.source || {};
      if (src.type === 'base64' && src.data) {

      }
      if (src.type === 'url' && src.url) {
        return `<div class="content-block"><img src="${esc(src.url)}" style="max-width:100%;border-radius:6px;border:1px solid var(--border);" /></div>`;
      }
      return `<div class="content-block"><em>[image: ${esc(src.media_type || 'unknown')}]</em></div>`;

  }).join('');
}

/* ─── Syntax highlight ─── */
function syntaxHL(obj) {
  const s = JSON.stringify(obj, null, 2);
  let out = '', i = 0; const len = s.length;
  while (i < len) {
    const c = s[i];
    if (c === '"') {
      let j = i + 1;
      while (j < len) { if (s[j] === '\\') { j += 2; continue; } if (s[j] === '"') break; j++; }
      j++;
      const raw = s.slice(i, j); let k = j;
      while (k < len && s[k] === ' ') k++;
      out += k < len && s[k] === ':' ? `<span class="jk">${esc(raw)}</span>` : `<span class="js">${esc(raw)}</span>`;
      i = j;
    } else if (c === '-' || (c >= '0' && c <= '9')) {
      const m = s.slice(i).match(/^-?\d+(\.\d+)?([eE][+-]?\d+)?/);
      if (m) { out += `<span class="jn">${m[0]}</span>`; i += m[0].length; } else { out += esc(c); i++; }
    } else if (s.slice(i, i + 4) === 'true') { out += '<span class="jb">true</span>'; i += 4; }
    else if (s.slice(i, i + 5) === 'false') { out += '<span class="jb">false</span>'; i += 5; }
    else if (s.slice(i, i + 4) === 'null') { out += '<span class="jnull">null</span>'; i += 4; }
    else { out += esc(c); i++; }
  }
  return out;
}

function copyCurl(btn) {
  let e = filtered[activeIdx]; if (!e) return;
  if (e._isStub) e = getFullEntry(e);
  const method = e.request?.method || 'POST', path = e.request?.path || '/v1/messages';
  const headers = e.request?.headers || {}, body = e.request?.body;
  const base = e.upstream_base_url || 'https://api.anthropic.com';
  let cmd = `curl -X ${method} '${base}${path}'`;
